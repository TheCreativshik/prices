<!DOCTYPE html>
<html lang="ru">
<head>

            </div>
            
            <div class="social-links">
                <a href="https://t.me/TheCreativshik" class="social-btn telegram" target="_blank">
                    <img src="tg.png" alt="Telegram" class="icon-img">
                    <span class="text">Telegram</span>
